

<!DOCTYPE html>
<html>
<head>

    <title>Admin Panel</title>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

</head>
<body>

<div class="sidebar">

    <div class="logo">
        Admin Panel
    </div>

    <a href="/logout">
        Logout
    </a>

</div>

<div class="main-content">

    <div class="topbar">

        <div>

            <h1 class="admin-title">
                Complaint Management
            </h1>

            <p class="text-secondary">
                Manage and update hostel complaints
            </p>

        </div>

    </div>

    <div class="section-box">

        <table class="table table-dark table-hover align-middle">

            <tr>

                <th>ID</th>
                <th>Student</th>
                <th>Room</th>
                <th>Category</th>
                <th>Description</th>
                <th>Status</th>

            </tr>

            {% for complaint in complaints %}

            <tr>

                <td>
                    {{ complaint[0] }}
                </td>

                <td>
                    {{ complaint[1] }}
                </td>

                <td>
                    {{ complaint[2] }}
                </td>

                <td>
                    {{ complaint[3] }}
                </td>

                <td>
                    {{ complaint[4] }}
                </td>

                <td>

                    <form method="POST">

                        <input
                        type="hidden"
                        name="complaint_id"
                        value="{{ complaint[0] }}">

                        <select
                        name="status"
                        class="form-select"
                        onchange="this.form.submit()">

                            <option
                            {% if complaint[5] == 'Pending' %}
                            selected
                            {% endif %}>
                            Pending
                            </option>

                            <option
                            {% if complaint[5] == 'In Progress' %}
                            selected
                            {% endif %}>
                            In Progress
                            </option>

                            <option
                            {% if complaint[5] == 'Resolved' %}
                            selected
                            {% endif %}>
                            Resolved
                            </option>

                        </select>

                    </form>

                </td>

            </tr>

            {% endfor %}

        </table>

    </div>

</div>

</body>
</html>
